<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命法天关 · 生死推演</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--card:#141420;--border:#2a2a3a;
  --gold:#d4a84b;--gold2:#f5d78e;--red:#c0392b;--red2:#e74c3c;
  --green:#27ae60;--blue:#2980b9;--text:#e8e0d0;--dim:#7a7568;
  --wood:#4ec96e;--fire:#ef5350;--earth:#ffb74d;--metal:#ffd54f;--water:#42a5f5;
}
body{background:var(--bg);color:var(--text);font-family:'Songti SC','Noto Serif SC','SimSun',serif;min-height:100vh;overflow-x:hidden}
.container{max-width:800px;margin:0 auto;padding:20px}

/* ===== 标题 ===== */
.title-section{text-align:center;padding:60px 20px 40px;position:relative}
.title-section::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.title-section::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.taiji{font-size:48px;margin-bottom:12px;animation:spin 20s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
h1{font-size:32px;color:var(--gold);letter-spacing:12px;font-weight:normal;margin-bottom:8px}
.subtitle{color:var(--dim);font-size:14px;letter-spacing:4px}

/* ===== 输入区 ===== */
.input-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:32px;margin:24px 0;position:relative}
.input-section::before{content:'【 开盘 】';position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--card);padding:0 16px;color:var(--gold);font-size:14px;letter-spacing:4px}
.form-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;align-items:end}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--dim);letter-spacing:2px}
.form-group input,.form-group select{background:#1a1a2e;border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:4px;font-size:16px;font-family:inherit;text-align:center;width:100px;outline:none;transition:border-color .3s}
.form-group select{width:160px;cursor:pointer}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.gender-row{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.gender-btn{padding:8px 24px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;border-radius:4px;font-family:inherit;font-size:14px;transition:all .3s}
.gender-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,75,.1)}
.submit-btn{display:block;margin:0 auto;padding:12px 48px;background:linear-gradient(135deg,#1a1a2e,#2a1a1e);border:1px solid var(--gold);color:var(--gold);font-size:18px;letter-spacing:8px;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .3s;position:relative;overflow:hidden}
.submit-btn:hover{background:linear-gradient(135deg,#2a2a3e,#3a2a2e);box-shadow:0 0 20px rgba(212,168,75,.2)}
.submit-btn:active{transform:scale(.98)}

/* ===== 结果区 ===== */
#results{display:none}
.result-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:28px;margin:20px 0;position:relative}
.section-title{text-align:center;color:var(--gold);font-size:16px;letter-spacing:6px;margin-bottom:20px;position:relative}
.section-title::before,.section-title::after{content:'—';margin:0 8px;color:var(--border)}

/* ===== 四柱 ===== */
.pillars{display:flex;justify-content:center;gap:20px;margin-bottom:20px}
.pillar{text-align:center;min-width:72px}
.pillar-label{font-size:11px;color:var(--dim);margin-bottom:6px;letter-spacing:2px}
.pillar-stem{font-size:28px;padding:8px;border-radius:4px 4px 0 0;border:1px solid var(--border);border-bottom:none}
.pillar-branch{font-size:28px;padding:8px;border-radius:0 0 4px 4px;border:1px solid var(--border)}
.pillar-element{font-size:11px;margin-top:4px;opacity:.7}
.el-wood{color:var(--wood)}.el-fire{color:var(--fire)}.el-earth{color:var(--earth)}.el-metal{color:var(--metal)}.el-water{color:var(--water)}
.bg-wood{background:rgba(78,201,110,.08)}.bg-fire{background:rgba(239,83,80,.08)}.bg-earth{background:rgba(255,183,77,.08)}.bg-metal{background:rgba(255,213,79,.08)}.bg-water{background:rgba(66,165,245,.08)}

.god-info{text-align:center;padding:12px;background:rgba(212,168,75,.05);border-radius:4px;font-size:13px;line-height:2;border:1px dashed var(--border)}
.god-info span{margin:0 8px}

/* ===== 年份时间线 ===== */
.timeline-controls{display:flex;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.decade-btn{padding:4px 12px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;border-radius:3px;font-size:12px;font-family:inherit;transition:all .2s}
.decade-btn.active{border-color:var(--gold);color:var(--gold)}
.timeline{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;margin-bottom:16px}
.year-dot{text-align:center;padding:8px 2px;border-radius:4px;cursor:pointer;transition:all .3s;border:1px solid transparent;font-size:12px;position:relative}
.year-dot:hover{border-color:var(--border);background:rgba(255,255,255,.03)}
.year-dot .age{display:block;font-size:10px;color:var(--dim);margin-bottom:2px}
.year-dot .yr{display:block;font-size:13px;margin-bottom:4px}
.year-dot .dot{display:block;width:10px;height:10px;border-radius:50%;margin:0 auto;transition:all .3s}
.dot-safe{background:var(--green);opacity:.3}
.dot-warn{background:var(--earth);box-shadow:0 0 6px var(--earth)}
.dot-danger{background:var(--red2);box-shadow:0 0 8px var(--red);animation:pulse 2s infinite}
.dot-crisis{background:var(--red2);box-shadow:0 0 12px var(--red),0 0 24px rgba(231,76,60,.3);animation:pulse 1.5s infinite}
.year-dot.selected{border-color:var(--gold);background:rgba(212,168,75,.1)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ===== 详情面板 ===== */
.detail-panel{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:6px;padding:20px;min-height:120px;transition:all .3s}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.detail-year{font-size:20px;color:var(--gold)}
.detail-verdict{padding:4px 12px;border-radius:3px;font-size:13px;font-weight:bold}
.verdict-safe{background:rgba(39,174,96,.15);color:var(--green);border:1px solid rgba(39,174,96,.3)}
.verdict-warn{background:rgba(255,183,77,.15);color:var(--earth);border:1px solid rgba(255,183,77,.3)}
.verdict-danger{background:rgba(231,76,60,.15);color:var(--red2);border:1px solid rgba(231,76,60,.3)}
.detail-body{font-size:13px;line-height:1.8;color:var(--dim)}
.detail-body .label{color:var(--text);display:inline}
.detail-body .tag{display:inline-block;padding:1px 6px;border-radius:2px;margin:2px;font-size:11px}
.tag-void{background:rgba(66,165,245,.15);color:var(--water);border:1px solid rgba(66,165,245,.2)}
.tag-ghost{background:rgba(156,39,176,.15);color:#ce93d8;border:1px solid rgba(156,39,176,.2)}
.tag-bottom{background:rgba(255,183,77,.15);color:var(--earth);border:1px solid rgba(255,183,77,.2)}
.tag-crisis{background:rgba(231,76,60,.15);color:var(--red2);border:1px solid rgba(231,76,60,.2)}
.detail-row{margin-bottom:6px}
.resolve-box{margin-top:12px;padding:12px;background:rgba(39,174,96,.05);border:1px solid rgba(39,174,96,.15);border-radius:4px}
.resolve-box h4{color:var(--green);font-size:13px;margin-bottom:6px}
.resolve-box p{font-size:12px;color:var(--dim);line-height:1.8}

/* ===== 统计 ===== */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
.stat-card{text-align:center;padding:16px;background:rgba(0,0,0,.2);border-radius:6px;border:1px solid var(--border)}
.stat-num{font-size:28px;font-weight:bold}
.stat-label{font-size:11px;color:var(--dim);margin-top:4px;letter-spacing:2px}
.stat-safe .stat-num{color:var(--green)}
.stat-warn .stat-num{color:var(--earth)}
.stat-danger .stat-num{color:var(--red2)}

/* ===== 加载动画 ===== */
.loading-overlay{position:fixed;inset:0;background:rgba(10,10,15,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
.loading-overlay.hide{opacity:0;pointer-events:none}
.loading-bagua{font-size:64px;animation:spin 3s linear infinite}
.loading-text{margin-top:20px;color:var(--gold);letter-spacing:8px;font-size:16px}
.loading-sub{margin-top:8px;color:var(--dim);font-size:12px;letter-spacing:2px}

/* ===== 底部 ===== */
.footer{text-align:center;padding:40px 20px;color:var(--dim);font-size:11px;line-height:2;letter-spacing:1px}
.footer a{color:var(--gold);text-decoration:none}

/* ===== 动画 ===== */
.fade-in{animation:fadeIn .8s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ===== 响应式 ===== */
@media(max-width:600px){
  h1{font-size:24px;letter-spacing:6px}
  .form-row{gap:8px}
  .form-group input{width:70px;padding:8px}
  .form-group select{width:140px}
  .pillars{gap:10px}
  .pillar{min-width:60px}
  .pillar-stem,.pillar-branch{font-size:22px;padding:6px}
  .timeline{grid-template-columns:repeat(5,1fr)}
  .stats{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="container">
  <!-- 标题 -->
  <div class="title-section">
    <div class="taiji">☯</div>
    <h1>命法天关</h1>
    <div class="subtitle">生死关口推演系统 · 基于王一禅秘法</div>
  </div>

  <!-- 输入区 -->
  <div class="input-section">
    <div class="form-row">
      <div class="form-group">
        <label>出生年</label>
        <input type="number" id="birthYear" min="1920" max="2030" placeholder="1990">
      </div>
      <div class="form-group">
        <label>月</label>
        <input type="number" id="birthMonth" min="1" max="12" placeholder="6">
      </div>
      <div class="form-group">
        <label>日</label>
        <input type="number" id="birthDay" min="1" max="31" placeholder="15">
      </div>
      <div class="form-group">
        <label>时辰</label>
        <select id="birthHour">
          <option value="0">子时 (23-1点)</option>
          <option value="1">丑时 (1-3点)</option>
          <option value="2">寅时 (3-5点)</option>
          <option value="3">卯时 (5-7点)</option>
          <option value="4">辰时 (7-9点)</option>
          <option value="5">巳时 (9-11点)</option>
          <option value="6" selected>午时 (11-13点)</option>
          <option value="7">未时 (13-15点)</option>
          <option value="8">申时 (15-17点)</option>
          <option value="9">酉时 (17-19点)</option>
          <option value="10">戌时 (19-21点)</option>
          <option value="11">亥时 (21-23点)</option>
        </select>
      </div>
    </div>
    <div class="gender-row">
      <button class="gender-btn active" data-gender="male" onclick="selectGender(this)">乾（男）</button>
      <button class="gender-btn" data-gender="female" onclick="selectGender(this)">坤（女）</button>
    </div>
    <button class="submit-btn" onclick="startPrediction()">推 演 命 局</button>
  </div>

  <!-- 结果区 -->
  <div id="results">
    <!-- 四柱 -->
    <div class="result-section fade-in">
      <div class="section-title">四 柱 排 盘</div>
      <div class="pillars" id="pillarsDisplay"></div>
      <div class="god-info" id="godInfo"></div>
    </div>

    <!-- 生死推演 -->
    <div class="result-section fade-in" style="animation-delay:.2s">
      <div class="section-title">生 死 推 演</div>
      <div class="timeline-controls" id="decadeButtons"></div>
      <div class="timeline" id="timeline"></div>
      <div class="detail-panel" id="detailPanel">
        <div style="text-align:center;color:var(--dim);padding:30px">点击上方年份查看详细分析</div>
      </div>
    </div>

    <!-- 统计 -->
    <div class="result-section fade-in" style="animation-delay:.4s">
      <div class="section-title">命 局 统 计</div>
      <div class="stats" id="statsDisplay"></div>
    </div>
  </div>

  <div class="footer">
    本工具基于王一禅《命法天关》古法推演，仅供学术研究与娱乐参考<br>
    命理预测不能替代现代医学，请理性看待
  </div>
</div>

<!-- 加载动画 -->
<div class="loading-overlay hide" id="loading">
  <div class="loading-bagua">☯</div>
  <div class="loading-text">推演命局中</div>
  <div class="loading-sub" id="loadingStep">排列四柱...</div>
</div>

<script>
// ==================== 常量 ====================
const STEMS = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const BRANCHES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ELEMENTS = ['木','火','土','金','水'];
const STEM_EL = [0,0,1,1,2,2,3,3,4,4]; // 天干五行
const BRANCH_EL = [4,2,0,0,2,1,1,2,3,3,2,4]; // 地支五行(主气)
const EL_CLASS = ['el-wood','el-fire','el-earth','el-metal','el-water'];
const BG_CLASS = ['bg-wood','bg-fire','bg-earth','bg-metal','bg-water'];

// 五行生克: 木0火1土2金3水4
// 生: 木→火→土→金→水→木
const GENERATES = [1,2,3,4,0];
// 克: 木→土, 火→金, 土→水, 金→木, 水→火
const CONTROLS = [2,3,4,0,1];
// 被生: 木←水, 火←木, 土←火, 金←土, 水←金
const GEN_BY = [4,0,1,2,3];
// 被克: 木←金, 火←水, 土←木, 金←火, 水←土
const CTRL_BY = [3,4,0,1,2];

const SHENG_XIAO = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];

// ==================== 历法引擎 ====================

// 儒略日数 (JDN)
function getJDN(y, m, d) {
  if (m <= 2) { y--; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
}

// 日干支 (基于已知参考日校准)
// 参考: 使用 JDN 偏移量来计算六十甲子序号
function getDayStemBranch(y, m, d) {
  const jdn = Math.floor(getJDN(y, m, d) + 0.5); // 取整修正
  // 校准: 通过模运算得到六十甲子序号
  const cycle = ((jdn + 49) % 60 + 60) % 60;
  return { stem: cycle % 10, branch: cycle % 12 };
}

// ==================== 四柱计算 ====================

// 节气日期(近似值, 用于判断月令)
function getSolarTermDay(m) {
  // 返回每个月令起始的大约日期
  const terms = [
    [2, 4],   // 寅月: 立春
    [3, 6],   // 卯月: 惊蛰
    [4, 5],   // 辰月: 清明
    [5, 6],   // 巳月: 立夏
    [6, 6],   // 午月: 芒种
    [7, 7],   // 未月: 小暑
    [8, 8],   // 申月: 立秋
    [9, 8],   // 酉月: 白露
    [10, 8],  // 戌月: 寒露
    [11, 7],  // 亥月: 立冬
    [12, 7],  // 子月: 大雪
    [1, 6],   // 丑月: 小寒
  ];
  return terms[m];
}

function getChineseMonthOffset(solarMonth, solarDay) {
  // 返回月令偏移 0=寅月(正月), 1=卯月(二月), ..., 11=丑月(腊月)
  const dayNum = (m, d) => {
    const cumDays = [0,0,31,59,90,120,151,181,212,243,273,304,334];
    return cumDays[m] + d;
  };
  const target = dayNum(solarMonth, solarDay);

  const boundaries = [
    { doy: dayNum(1, 6), offset: 11 },   // 小寒: 丑月
    { doy: dayNum(2, 4), offset: 0 },    // 立春: 寅月
    { doy: dayNum(3, 6), offset: 1 },    // 惊蛰: 卯月
    { doy: dayNum(4, 5), offset: 2 },    // 清明: 辰月
    { doy: dayNum(5, 6), offset: 3 },    // 立夏: 巳月
    { doy: dayNum(6, 6), offset: 4 },    // 芒种: 午月
    { doy: dayNum(7, 7), offset: 5 },    // 小暑: 未月
    { doy: dayNum(8, 8), offset: 6 },    // 立秋: 申月
    { doy: dayNum(9, 8), offset: 7 },    // 白露: 酉月
    { doy: dayNum(10, 8), offset: 8 },   // 寒露: 戌月
    { doy: dayNum(11, 7), offset: 9 },   // 立冬: 亥月
    { doy: dayNum(12, 7), offset: 10 },  // 大雪: 子月
  ];

  let result = 10; // 默认子月 (1月6日前)
  for (const b of boundaries) {
    if (target >= b.doy) result = b.offset;
  }
  return result;
}

function calculateFourPillars(year, month, day, hour) {
  // ===== 年柱 =====
  let adjustedYear = year;
  // 立春前用上一年
  if (month < 2 || (month === 2 && day < 4)) adjustedYear--;
  const yearStem = ((adjustedYear - 4) % 10 + 10) % 10;
  const yearBranch = ((adjustedYear - 4) % 12 + 12) % 12;

  // ===== 月柱 =====
  const monthOffset = getChineseMonthOffset(month, day);
  const monthBranch = (monthOffset + 2) % 12; // 寅=2
  // 五虎遁: 甲己丙作首, 乙庚戊为头, 丙辛庚上起, 丁壬壬位求, 戊癸甲寅始
  const monthStemStart = [2, 4, 6, 8, 0][yearStem % 5];
  const monthStem = (monthStemStart + monthOffset) % 10;

  // ===== 日柱 =====
  const dayPillar = getDayStemBranch(year, month, day);

  // ===== 时柱 =====
  const hourBranch = hour;
  // 五鼠遁: 甲己甲子起, 乙庚丙子始, 丙辛戊子初, 丁壬庚子居, 戊癸壬子流
  const hourStemStart = [0, 2, 4, 6, 8][dayPillar.stem % 5];
  const hourStem = (hourStemStart + hour) % 10;

  return {
    year: { stem: yearStem, branch: yearBranch },
    month: { stem: monthStem, branch: monthBranch },
    day: { stem: dayPillar.stem, branch: dayPillar.branch },
    hour: { stem: hourStem, branch: hourBranch }
  };
}

// ==================== 空亡计算 ====================

// 旬空 (六甲空亡)
function getXunVoid(stem, branch) {
  const start = ((branch - stem) % 12 + 12) % 12;
  const map = { 0:[10,11], 10:[8,9], 8:[6,7], 6:[4,5], 4:[2,3], 2:[0,1] };
  return map[start] || [];
}

// 路空 (截路空亡)
function getPathVoid(stem) {
  const group = stem % 5;
  return [[8,9],[6,7],[4,5],[2,3],[0,1,10,11]][group];
}

// 魂空 (游魂空亡)
function getSoulVoid(stem) {
  const group = stem % 5;
  return [[7,8,1,2],[3,4,9,10],[1,2,7,8],[11,0,5,6],[9,10,3,4]][group];
}

// 五鬼
function getFiveGhost(stem, branch) {
  const xunVoid = getXunVoid(stem, branch);
  return xunVoid.map(b => (b + 6) % 12);
}

// ==================== 用神判断 ====================

function determineUsefulGod(pillars) {
  const dayEl = STEM_EL[pillars.day.stem];

  // 统计八字五行力量
  const power = [0,0,0,0,0];
  const allPillars = [pillars.year, pillars.month, pillars.day, pillars.hour];

  for (const p of allPillars) {
    power[STEM_EL[p.stem]] += 1.5;
    power[BRANCH_EL[p.branch]] += 1.0;
  }
  // 月令加权(月支得令力量最大)
  power[BRANCH_EL[pillars.month.branch]] += 2.0;

  // 自身力量 = 同类 + 生我
  const selfPower = power[dayEl] + power[GEN_BY[dayEl]];
  // 异类力量 = 克我 + 我克 + 我生
  const otherPower = power[CTRL_BY[dayEl]] + power[CONTROLS[dayEl]] + power[GENERATES[dayEl]];

  const isStrong = selfPower >= otherPower;

  let usefulGod, inauspiciousGod;
  if (isStrong) {
    // 身强: 用神为克泄耗 (官杀、食伤、财星)
    // 优先取克制: 克我者为官杀
    usefulGod = CTRL_BY[dayEl];
    inauspiciousGod = GEN_BY[dayEl]; // 生我者为忌
  } else {
    // 身弱: 用神为生扶 (印星、比劫)
    usefulGod = GEN_BY[dayEl]; // 生我者为用
    inauspiciousGod = CTRL_BY[dayEl]; // 克我者为忌
  }

  return {
    dayElement: dayEl,
    isStrong,
    usefulGod,
    inauspiciousGod,
    selfPower: selfPower.toFixed(1),
    otherPower: otherPower.toFixed(1)
  };
}

// ==================== 棺材底 ====================
// 核心: 流年必须是真正的忌神大凶年, 需要多重条件叠加

function checkCoffinBottom(pillars, godInfo, yearStem, yearBranch, flowBirth) {
  const dayEl = godInfo.dayElement;
  const useful = godInfo.usefulGod;
  const ominous = godInfo.inauspiciousGod;

  let score = 0;
  const reasons = [];

  const yStemEl = STEM_EL[yearStem];
  const yBranchEl = BRANCH_EL[yearBranch];
  const fbStemEl = STEM_EL[flowBirth.stem];
  const fbBranchEl = BRANCH_EL[flowBirth.branch];

  // === 主条件: 流年干支为忌神 (必须至少一个成立才有可能) ===
  const stemIsOminous = yStemEl === ominous;
  const branchIsOminous = yBranchEl === ominous;
  if (stemIsOminous) { score += 3; reasons.push('流年天干为忌神(' + ELEMENTS[ominous] + ')'); }
  if (branchIsOminous) { score += 3; reasons.push('流年地支为忌神'); }

  // === 辅助条件: 损用伤身 ===
  if (CONTROLS[yStemEl] === useful) { score += 2; reasons.push('流年天干克用神'); }
  if (CONTROLS[yStemEl] === dayEl && !godInfo.isStrong) { score += 2; reasons.push('流年克身弱日主'); }
  if ((yearBranch + 6) % 12 === pillars.day.branch) { score += 2; reasons.push('流年冲日支'); }

  // === 流生加重 ===
  if (fbStemEl === ominous && stemIsOminous) { score += 1; reasons.push('流生天干亦为忌神'); }

  // 门槛: 需 >= 7 (必须主条件+多个辅助同时成立)
  // 且必须满足: 流年干或支至少有一个是忌神 (前提条件)
  const hasMainCondition = stemIsOminous || branchIsOminous;
  return { isTrue: hasMainCondition && score >= 7, score, reasons };
}

// ==================== 棺材盖 ====================
// 核心: 三空必须在关键位严格交汇, 条件从严

function checkCoffinLid(pillars, flowBirth, flowComb, yearStem, yearBranch) {
  const dayBranch = pillars.day.branch;
  const fbBranch = flowBirth.branch;
  const yBranch = yearBranch;

  // 三个关键位: 日支、流生支、流年支(太岁)
  const criticalPos = [dayBranch, fbBranch, yBranch];

  // 旬空: 仅用流生查 (不叠加日柱旬空, 避免过松)
  const xunVoid = getXunVoid(flowBirth.stem, flowBirth.branch);
  // 路空: 用日干
  const pathVoid = getPathVoid(pillars.day.stem);
  // 魂空: 用日干
  const soulVoid = getSoulVoid(pillars.day.stem);

  const reasons = [];
  const voidDetails = [];
  let lidScore = 0; // 棺材盖积分, 用于最终排序

  // ===== 一盘: 三空相会 =====
  // 日支同时落入旬空+路空+魂空 (最严格, 概率约1/100)
  const dayInXun = xunVoid.includes(dayBranch);
  const dayInPath = pathVoid.includes(dayBranch);
  const dayInSoul = soulVoid.includes(dayBranch);
  const threeVoidConverge = dayInXun && dayInPath && dayInSoul;
  if (threeVoidConverge) { reasons.push('一盘·三空相会(日支三空齐聚)'); lidScore += 10; }

  // ===== 一盘: 三方空亡 =====
  // 同一种空在全部三个关键位都出现 (不是两个, 必须三个)
  const xunCount = criticalPos.filter(b => xunVoid.includes(b)).length;
  const pathCount = criticalPos.filter(b => pathVoid.includes(b)).length;
  const soulCount = criticalPos.filter(b => soulVoid.includes(b)).length;
  const threeDirectionVoid = xunCount === 3 || pathCount === 3 || soulCount === 3;
  if (threeDirectionVoid) { reasons.push('一盘·三方空亡(同空覆三位)'); lidScore += 8; }

  // ===== 二盘: 冲补空 =====
  // 需要: 关键位六冲旬空支 + 该位本身路空或魂空 (双重条件)
  let clashVoid = false;
  for (const b of criticalPos) {
    const clash = (b + 6) % 12;
    const hasClashXun = xunVoid.includes(clash);
    const selfVoidCount = (pathVoid.includes(b) ? 1 : 0) + (soulVoid.includes(b) ? 1 : 0);
    if (hasClashXun && selfVoidCount >= 2) {
      clashVoid = true;
      reasons.push('二盘·冲补空(' + BRANCHES[b] + '冲' + BRANCHES[clash] + ',兼路空魂空)');
      lidScore += 6;
      break;
    }
  }

  // ===== 三盘: 五鬼 =====
  const fiveGhost = getFiveGhost(yearStem, yearBranch);

  // 五鬼带两空: 某关键位同时是五鬼+两种空亡
  let ghostTwoVoids = false;
  for (const b of criticalPos) {
    if (fiveGhost.includes(b)) {
      let voidCount = 0;
      if (xunVoid.includes(b)) voidCount++;
      if (pathVoid.includes(b)) voidCount++;
      if (soulVoid.includes(b)) voidCount++;
      if (voidCount >= 2) {
        ghostTwoVoids = true;
        reasons.push('三盘·五鬼带两空(' + BRANCHES[b] + '位)');
        lidScore += 5;
        break;
      }
    }
  }

  // 五鬼压三方: 五鬼在全部三个关键位都出现
  const ghostThreeDir = criticalPos.filter(b => fiveGhost.includes(b)).length === 3;
  if (ghostThreeDir && !ghostTwoVoids) { reasons.push('三盘·五鬼压三方'); lidScore += 5; }

  // 记录空亡分布
  for (const b of criticalPos) {
    const voids = [];
    if (xunVoid.includes(b)) voids.push('旬空');
    if (pathVoid.includes(b)) voids.push('路空');
    if (soulVoid.includes(b)) voids.push('魂空');
    if (fiveGhost.includes(b)) voids.push('五鬼');
    if (voids.length > 0) voidDetails.push({ branch: BRANCHES[b], voids });
  }

  const isTrue = threeVoidConverge || threeDirectionVoid || clashVoid || ghostTwoVoids || ghostThreeDir;

  return {
    isTrue, reasons, voidDetails, lidScore,
    threeVoidConverge, threeDirectionVoid, clashVoid, ghostTwoVoids, ghostThreeDir,
    xunVoid, pathVoid, soulVoid, fiveGhost
  };
}

// ==================== 严重程度 ====================

function determineSeverity(coffinBottom, coffinLid) {
  if (!coffinBottom.isTrue || !coffinLid.isTrue) return null;

  if (coffinLid.threeVoidConverge) return { level: 3, name: '大关口', color: 'var(--red2)', desc: '一盘三空定死局 — 最危险级别' };
  if (coffinLid.threeDirectionVoid) return { level: 3, name: '大关口', color: 'var(--red2)', desc: '三方空亡 — 极度危险' };
  if (coffinLid.ghostTwoVoids) return { level: 2, name: '中关口', color: 'var(--earth)', desc: '五鬼带两空 — 需重点化解' };
  if (coffinLid.ghostThreeDir) return { level: 2, name: '中关口', color: 'var(--earth)', desc: '五鬼压三方 — 需及时化解' };
  if (coffinLid.clashVoid) return { level: 2, name: '中关口', color: 'var(--earth)', desc: '二盘冲补空 — 暗藏危机' };
  return { level: 1, name: '小关口', color: '#e67e22', desc: '条件部分成立 — 可化解' };
}

  return resolutions[severity.level];
}

// ==================== 主推演引擎 ====================

let analysisData = null;
let currentDecade = 0;

function analyzeAllYears(pillars, godInfo, birthYear, birthMonth, birthDay) {
  const results = [];
  const startYear = birthYear;
  const endYear = birthYear + 100;

  for (let y = startYear; y <= endYear; y++) {
    // 流年干支
    const yearStem = ((y - 4) % 10 + 10) % 10;
    const yearBranch = ((y - 4) % 12 + 12) % 12;

    // 流生: 所测之年的出生日干支
    let fbMonth = birthMonth;
    let fbDay = birthDay;
    // 处理闰年2月29日
    if (fbMonth === 2 && fbDay === 29) {
      const isLeap = (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0;
      if (!isLeap) fbDay = 28;
    }
    const flowBirth = getDayStemBranch(y, fbMonth, fbDay);

    // 流组: 流年天干 + 流生地支
    const flowComb = { stem: yearStem, branch: flowBirth.branch };

    // 棺材底
    const coffinBottom = checkCoffinBottom(pillars, godInfo, yearStem, yearBranch, flowBirth);
    // 棺材盖
    const coffinLid = checkCoffinLid(pillars, flowBirth, flowComb, yearStem, yearBranch);

    // 综合评分 (用于最终筛选)
    const totalScore = coffinBottom.score + (coffinLid.lidScore || 0);

    results.push({
      year: y,
      age: y - birthYear,
      yearStem, yearBranch,
      yearGanZhi: STEMS[yearStem] + BRANCHES[yearBranch],
      flowBirth, flowComb,
      coffinBottom, coffinLid,
      isCrisis: false, severity: null, danger: 0,
      totalScore
    });
  }

  // ====== 关键: 筛选真正的生死关口 (最多3个) ======
  // 1. 找出所有棺材底+棺材盖同时成立的年份
  const candidates = results.filter(r => r.coffinBottom.isTrue && r.coffinLid.isTrue);

  // 2. 按综合严重度排序, 只取前3个最凶的
  candidates.sort((a, b) => b.totalScore - a.totalScore);
  const MAX_CRISIS = 3;
  const crisisYears = candidates.slice(0, MAX_CRISIS);

  // 3. 标记这些年份为生死关口
  for (const crisis of crisisYears) {
    const r = results.find(x => x.year === crisis.year);
    r.isCrisis = true;
    r.severity = determineSeverity(r.coffinBottom, r.coffinLid);
    r.danger = r.severity ? Math.min(r.severity.level + 1, 3) : 2;
  }

  // 4. 单条件成立的年份标为"流年不利" (但不是关口)
  for (const r of results) {
    if (r.isCrisis) continue;
    if (r.coffinBottom.isTrue || r.coffinLid.isTrue) r.danger = 1;
  }

  return results;
}

let gender = 'male';

function startPrediction() {
  const year = parseInt(document.getElementById('birthYear').value);
  const month = parseInt(document.getElementById('birthMonth').value);
  const day = parseInt(document.getElementById('birthDay').value);
  const hour = parseInt(document.getElementById('birthHour').value);

  if (!year || !month || !day || year < 1900 || year > 2030 || month < 1 || month > 12 || day < 1 || day > 31) {
    alert('请输入有效的出生日期');
    return;
  }

  // 显示加载
  const loading = document.getElementById('loading');
  const loadingStep = document.getElementById('loadingStep');
  loading.classList.remove('hide');

  const steps = ['排列四柱...', '推算用神忌神...', '查三空分布...', '定棺材底...', '合棺材盖...', '断生死关口...'];
  let stepIdx = 0;
  const stepInterval = setInterval(() => {
    stepIdx++;
    if (stepIdx < steps.length) loadingStep.textContent = steps[stepIdx];
  }, 400);

  setTimeout(() => {
    clearInterval(stepInterval);

    try {
      // 计算四柱
      const pillars = calculateFourPillars(year, month, day, hour);
      const godInfo = determineUsefulGod(pillars);

      // 推演所有年份
      const results = analyzeAllYears(pillars, godInfo, year, month, day);

      analysisData = { pillars, godInfo, results, birthYear: year };

      // 渲染结果
      renderPillars(pillars, godInfo);
      renderGodInfo(godInfo);
      renderTimeline(results, year);
      renderStats(results);

      // 显示结果
      document.getElementById('results').style.display = 'block';

      // 滚动到结果
      setTimeout(() => {
        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
      }, 300);
    } catch (e) {
      alert('推演出错: ' + e.message);
      console.error(e);
    }

    // 隐藏加载（即使出错也要关闭）
    loading.classList.add('hide');
  }, 2500);
}

  const safeYears = results.filter(r => r.danger === 0);

  container.innerHTML = `
    <div class="stat-card stat-safe">
      <div class="stat-num">${safeYears.length}</div>
      <div class="stat-label">平安之年</div>
    </div>
    <div class="stat-card stat-warn">
      <div class="stat-num">${warnYears.length}</div>
      <div class="stat-label">流年不利</div>
    </div>
    <div class="stat-card stat-danger">
      <div class="stat-num">${crisisYears.length}</div>
      <div class="stat-label">生死关口</div>
    </div>
  `;

  if (crisisYears.length > 0) {
    let detail = '<div style="margin-top:16px;padding:12px;background:rgba(231,76,60,.05);border:1px solid rgba(231,76,60,.15);border-radius:6px">';
    detail += '<div style="color:var(--red2);margin-bottom:8px;font-size:13px">生死关口年份:</div>';
    crisisYears.forEach(r => {
      const sev = r.severity;
      detail += `<span class="tag tag-crisis" style="cursor:pointer;margin:2px" onclick="jumpToYear(${r.year})">${r.year}年(${r.age}岁) ${sev ? sev.name : ''}</span> `;
    });
    detail += '</div>';
    container.innerHTML += detail;
  }
}

function jumpToYear(year) {
  const idx = Math.floor((year - analysisData.birthYear) / 10);
  switchDecade(idx);
  setTimeout(() => showDetail(year), 100);
  document.getElementById('timeline').scrollIntoView({ behavior: 'smooth' });
}

// 页面加载完成后设置默认值
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('birthYear').value = now.getFullYear() - 30;
});
</script>
</body>
</html>
